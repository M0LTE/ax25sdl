name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # GitHub will force JavaScript actions onto Node.js 24 from
  # June 2nd, 2026. Opting in early matches m0lte/packet.net.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Build + test the C# codegen + Sdl package ─────────────────────
  csharp:
    name: C# build + test
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - name: dotnet --version
        run: dotnet --version
      - name: build
        run: dotnet build codegen/ax25sdl.slnx --nologo
      - name: test
        run: dotnet test codegen/ax25sdl.slnx --nologo --no-build

  # ─── Codegen drift: regen each backend, error if the committed
  #     generated files don't match the freshly-generated output. ───
  csharp-drift:
    name: codegen drift — C#
    runs-on: [self-hosted, Linux, X64]
    needs: csharp
    steps:
      - uses: actions/checkout@v6
      - name: regenerate C#
        run: dotnet run --project codegen/src/Packet.Sdl.CodeGen --configuration Release -- --csharp
      - name: assert no diff
        run: |
          if ! git diff --exit-code -- spec/csharp/; then
            echo "::error::Generated C# files in spec/csharp/ are out of sync with the SDL YAML. Run \`dotnet run --project codegen/src/Packet.Sdl.CodeGen -- --csharp\` locally and commit the diff."
            exit 1
          fi

  ts-drift:
    name: codegen drift — TS + typecheck/test
    runs-on: [self-hosted, Linux, X64]
    needs: csharp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: spec/ts/package-lock.json
      - name: regenerate TS
        run: dotnet run --project codegen/src/Packet.Sdl.CodeGen --configuration Release -- --ts
      - name: assert no diff
        run: |
          if ! git diff --exit-code -- spec/ts/; then
            echo "::error::Generated TS files in spec/ts/ are out of sync. Run \`dotnet run --project codegen/src/Packet.Sdl.CodeGen -- --ts\` locally and commit the diff."
            exit 1
          fi
      - name: spec/ts — install
        working-directory: spec/ts
        run: npm ci
      - name: spec/ts — typecheck
        working-directory: spec/ts
        run: npm run typecheck
      - name: spec/ts — test
        working-directory: spec/ts
        run: npm test
      - name: spec/ts — build
        working-directory: spec/ts
        run: npm run build

  go-drift:
    name: codegen drift — Go + build/vet/test/gofmt
    runs-on: [self-hosted, Linux, X64]
    needs: csharp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          # No external Go deps → no go.sum → caching would warn on every run.
          cache: false
      - name: regenerate Go
        run: dotnet run --project codegen/src/Packet.Sdl.CodeGen --configuration Release -- --go
      - name: assert no diff
        run: |
          if ! git diff --exit-code -- spec/go/; then
            echo "::error::Generated Go files in spec/go/ are out of sync. Run \`dotnet run --project codegen/src/Packet.Sdl.CodeGen -- --go\` locally and commit the diff."
            exit 1
          fi
      - name: go build
        working-directory: spec/go
        run: go build ./...
      - name: go vet
        working-directory: spec/go
        run: go vet ./...
      - name: go test
        working-directory: spec/go
        run: go test ./...
      - name: gofmt
        working-directory: spec/go
        run: |
          mismatched=$(gofmt -l .)
          if [ -n "$mismatched" ]; then
            echo "::error::gofmt finds files needing reformatting:"
            echo "$mismatched"
            exit 1
          fi

  json-drift:
    name: codegen drift — JSON + schema validation
    runs-on: [self-hosted, Linux, X64]
    needs: csharp
    steps:
      - uses: actions/checkout@v6
      - name: regenerate JSON
        run: dotnet run --project codegen/src/Packet.Sdl.CodeGen --configuration Release -- --json
      - name: assert no diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated JSON files are out of sync."
            exit 1
          fi

  rust-drift:
    name: codegen drift — Rust + cargo build/test/fmt
    runs-on: [self-hosted, Linux, X64]
    needs: csharp
    steps:
      - uses: actions/checkout@v6
      - name: regenerate Rust
        run: dotnet run --project codegen/src/Packet.Sdl.CodeGen --configuration Release -- --rust
      - name: assert no diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated Rust files are out of sync. Run \`dotnet run --project codegen/src/Packet.Sdl.CodeGen -- --rust\` locally and commit the diff."
            exit 1
          fi
      - name: cargo fmt --check
        working-directory: spec/rust
        run: cargo fmt --check
      - name: cargo build
        working-directory: spec/rust
        run: cargo build
      - name: cargo test
        working-directory: spec/rust
        run: cargo test

  c-drift:
    name: codegen drift — C + cmake build/ctest/clang-format
    runs-on: [self-hosted, Linux, X64]
    needs: csharp
    steps:
      - uses: actions/checkout@v6
      - name: regenerate C
        run: dotnet run --project codegen/src/Packet.Sdl.CodeGen --configuration Release -- --c
      - name: assert no diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated C files are out of sync. Run \`dotnet run --project codegen/src/Packet.Sdl.CodeGen -- --c\` locally and commit the diff."
            exit 1
          fi
      - name: cmake build + ctest
        working-directory: spec/c
        run: |
          cmake -B build -S .
          cmake --build build
          ctest --test-dir build --output-on-failure

  python-drift:
    name: codegen drift — Python + pytest/ruff
    runs-on: [self-hosted, Linux, X64]
    needs: csharp
    steps:
      - uses: actions/checkout@v6
      - name: regenerate Python
        run: dotnet run --project codegen/src/Packet.Sdl.CodeGen --configuration Release -- --python
      - name: assert no diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated Python files are out of sync. Run \`dotnet run --project codegen/src/Packet.Sdl.CodeGen -- --python\` locally and commit the diff."
            exit 1
          fi
      - name: pytest + ruff
        working-directory: spec/python
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet pytest ruff
          .venv/bin/ruff check .
          .venv/bin/pytest -q --import-mode=importlib

  transcribe-drift:
    name: transcribe drift — graphml → yaml
    runs-on: [self-hosted, Linux, X64]
    needs: csharp
    # If the committed *.sdl.yaml files drift from what Packet.Sdl.Transcribe
    # would currently produce from the *.graphml sources, surface that as a
    # clear test-suite failure with the exact command to run locally. Pairs
    # with the YAML-side drift jobs above (which guard yaml → code) to lock
    # the full graphml → yaml → code pipeline.
    steps:
      - uses: actions/checkout@v6
      - name: regenerate yaml from graphml
        run: |
          dotnet run --project codegen/src/Packet.Sdl.Transcribe --configuration Release -- \
            -i spec-sdl/v2.2-errata/data-link/sdl/ \
            -o spec-sdl/v2.2-errata/data-link/yaml/
      - name: assert no diff
        run: |
          if ! git diff --exit-code -- spec-sdl/v2.2-errata/data-link/yaml/*.sdl.yaml; then
            echo "::error::*.sdl.yaml files are out of sync with their *.graphml sources. Run \`dotnet run --project codegen/src/Packet.Sdl.Transcribe -- -i spec-sdl/v2.2-errata/data-link/sdl/ -o spec-sdl/v2.2-errata/data-link/yaml/\` locally and commit the diff."
            exit 1
          fi
